<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obrigado - YouZit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-['Inter'] bg-gray-50 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white w-full shadow-sm">
      <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-16">
          <a href="/" class="text-xl font-semibold">YouZit</a>
        </div>
      </div>
    </nav>

    <!-- Thank You Content -->
    <main class="flex-grow flex items-center justify-center py-16 px-4">
      <div class="max-w-md w-full text-center">
        <!-- Success Icon -->
        <div
          class="mb-8 inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full"
        >
          <svg
            class="w-8 h-8 text-green-500"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 13l4 4L19 7"
            />
          </svg>
        </div>

        <h1 class="text-3xl font-bold text-gray-900 mb-4">
          Você está na lista!
        </h1>

        <p class="text-gray-600 mb-8">
          Obrigado por entrar na nossa lista de espera. Você está na fila para
          ser um dos primeiros a experimentar o YouZit.
        </p>

        <!-- Share Section -->
        <div class="space-y-4">
          <p class="text-sm text-gray-500">
            Compartilhe o YouZit com seus amigos
          </p>
          <div class="flex justify-center gap-4">
            <a
              href="https://twitter.com/intent/tweet?text=Acabei%20de%20entrar%20na%20lista%20de%20espera%20do%20YouZit%20-%20um%20assistente%20de%20ecossistema%20de%20conteúdo%20com%20IA!%20Junte-se%20a%20mim%20em%20youzit.com"
              target="_blank"
              rel="noopener noreferrer"
              class="inline-flex items-center justify-center w-10 h-10 bg-gray-100 rounded-full hover:bg-gray-200 transition"
            >
              <svg
                class="w-5 h-5 text-gray-600"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"
                />
              </svg>
            </a>
            <button
              onclick="copyToClipboard('https://youzit.com')"
              class="inline-flex items-center justify-center w-10 h-10 bg-gray-100 rounded-full hover:bg-gray-200 transition"
            >
              <svg
                class="w-5 h-5 text-gray-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"
                />
              </svg>
            </button>
          </div>
        </div>

        <a
          href="index.html"
          class="mt-12 inline-block text-indigo-600 hover:text-indigo-700 transition"
        >
          ← Voltar para a página inicial
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-100 py-8">
      <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
        Copyright © 2025 YouZit - Todos os direitos reservados
      </div>
    </footer>

    <!-- Copy to Clipboard Script -->
    <script>
      function copyToClipboard(text) {
        navigator.clipboard
          .writeText(text)
          .then(() => {
            alert("Link copiado para a área de transferência!");
          })
          .catch((err) => {
            console.error("Falha ao copiar texto: ", err);
          });
      }
    </script>
  </body>
</html>
